<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ClikCoin TikTok</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #000; 
  overflow: hidden; 
  font-family: Arial; 
}
.feed {
  height: 100vh;
  width: 100vw;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
}
.video-item {
  height: 100vh;
  width: 100vw;
  position: relative;
  scroll-snap-align: start;
  background: #000;
}
.video-item video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.overlay {
  position: absolute;
  bottom: 80px;
  left: 15px;
  color: white;
  z-index: 5;
}
.overlay h3 { font-size: 18px; margin-bottom: 5px; }
.overlay p { font-size: 14px; opacity: 0.9; }
.right-menu {
  position: absolute;
  right: 15px;
  bottom: 120px;
  display: flex;
  flex-direction: column;
  gap: 25px;
  z-index: 5;
}
.right-menu button {
  background: rgba(0,0,0,0.4);
  border: none;
  color: white;
  font-size: 28px;
  cursor: pointer;
}
.ad-timer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.8);
  color: gold;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  font-size: 22px;
  z-index: 10;
  display: none;
}
.admin-btn {
  position: fixed;
  bottom: 15px;
  left: 15px;
  background: red;
  color: white;
  padding: 8px 12px;
  border-radius: 50px;
  border: none;
  z-index: 999;
  font-size: 12px;
}
.admin-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  z-index: 1000;
  padding: 20px;
  color: white;
  display: none;
  overflow-y: scroll;
}
.admin-panel input, .admin-panel textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  background: #222;
  border: 1px solid gold;
  color: white;
  border-radius: 8px;
}
</style>
</head>
<body>

<!-- FEED VIDEO KAYAK TIKTOK -->
<div class="feed" id="feed"></div>

<!-- IKLAN 5 DETIK -->
<div class="ad-timer" id="adBox">
  <p>📢 CLIKCOIN ADS</p>
  <p>Skip <span id="timer">5</span> detik</p>
  <small>Nonton = Kreator +30 Koin</small>
</div>

<!-- TOMBOL ADMIN -->
<button class="admin-btn" onclick="bukaAdmin()">⚙️ Admin</button>

<!-- PANEL ADMIN TAMBAH VIDEO -->
<div class="admin-panel" id="adminPanel">
  <h2>⚙️ PANEL ADMIN CLIKCOIN</h2>
  <p>Tambah video baru. 1 baris = 1 video</p>
  
  <label>Link Video MP4 | Judul | Deskripsi</label>
  <textarea id="inputVideo" rows="5" placeholder="https://drive.google.com/uc?export=download&id=xxx | Judul Video | Deskripsi singkat"></textarea>
  
  <button onclick="tambahVideo()">Tambah Video</button>
  <button onclick="tutupAdmin()" style="background:gray">Tutup</button>
  <small>Aturan: Link harus .mp4 langsung dari Google Drive. Pisah pake tanda |</small>
  
  <h3 style="margin-top:20px;">Daftar Video Sekarang:</h3>
  <div id="daftarVideo"></div>
</div>

<script>
// ===== DATA VIDEO DISIMPEN DI LOCALSTORAGE =====
let daftarVideo = JSON.parse(localStorage.getItem('clikcoin_videos')) || [
  'https://drive.google.com/uc?export=download&id=1xVIDEO1 | Video Pertama | Ini contoh video ClikCoin',
  'https://drive.google.com/uc?export=download&id=1xVIDEO2 | Video Kedua | Swipe ke atas buat ganti'
];
let isVip = localStorage.getItem('clikcoin_vip') === 'true';
let saldoKreator = parseInt(localStorage.getItem('clikcoin_saldo') || '0');
let videoKe = 0;

// ===== BIKIN FEED TIKTOK OTOMATIS =====
function loadFeed() {
  let feed = document.getElementById('feed');
  feed.innerHTML = '';
  
  daftarVideo.forEach((item, index) => {
    let [link, judul, deskripsi] = item.split(' | ');
    
    let div = document.createElement('div');
    div.className = 'video-item';
    div.innerHTML = `
      <video src="${link}" playsinline loop></video>
      <div class="overlay">
        <h3>${judul || 'ClikCoin Video'}</h3>
        <p>${deskripsi || ''}</p>
      </div>
      <div class="right-menu">
        <button>❤️</button>
        <button>💬</button>
        <button>↗️</button>
        ${!isVip ? '<button onclick="upgradeVip()">👑</button>' : '<button>👑</button>'}
      </div>
    `;
    feed.appendChild(div);
  });
}
loadFeed();

// ===== AUTO PLAY + IKLAN 5 DETIK KAYAK TIKTOK =====
const videos = document.querySelectorAll('video');
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting) {
      videos.forEach(v => v.pause());
      entry.target.play();
      
      videoKe++;
      // Munculin iklan tiap video ke-3 kalo bukan VIP
      if(!isVip && videoKe % 3 === 0) {
        munculIklan();
      }
    } else {
      entry.target.pause();
    }
  });
}, { threshold: 0.6 });

videos.forEach(v => observer.observe(v));

function munculIklan() {
  let adBox = document.getElementById('adBox');
  adBox.style.display = 'block';
  let detik = 5;
  document.getElementById('timer').innerText = detik;
  
  let timer = setInterval(() => {
    detik--;
    document.getElementById('timer').innerText = detik;
    if(detik < 0) {
      clearInterval(timer);
      adBox.style.display = 'none';
      
      saldoKreator += 30;
      localStorage.setItem('clikcoin_saldo', saldoKreator);
      console.log('Kreator +30 Koin');
    }
  }, 1000);
}

// ===== PANEL ADMIN TAMBAH VIDEO =====
function bukaAdmin() {
  document.getElementById('adminPanel').style.display = 'block';
  tampilDaftarVideo();
}
function tutupAdmin() {
  document.getElementById('adminPanel').style.display = 'none';
}
function tambahVideo() {
  let input = document.getElementById('inputVideo').value.trim();
  if(!input.includes('.mp4')) {
    alert('Link harus .mp4 gob');
    return;
  }
  daftarVideo.push(input);
  localStorage.setItem('clikcoin_videos', JSON.stringify(daftarVideo));
  alert('Video ditambah! Refresh halaman');
  location.reload();
}
function tampilDaftarVideo() {
  let div = document.getElementById('daftarVideo');
  div.innerHTML = daftarVideo.map((v,i) => `<p>${i+1}. ${v.split(' | ')[1]}</p>`).join('');
}

// ===== VIP BEBAS IKLAN =====
function upgradeVip() {
  if(confirm('Beli VIP 15.000 Koin biar gak ada iklan 30 hari?')) {
    localStorage.setItem('clikcoin_vip', 'true');
    localStorage.setItem('clikcoin_expired', Date.now() + 30*24*60*60*1000);
    location.reload();
  }
}

// Cek VIP expired
let expired = localStorage.getItem('clikcoin_expired');
if(expired && Date.now() > parseInt(expired)) {
  localStorage.removeItem('clikcoin_vip');
  localStorage.removeItem('clikcoin_expired');
  isVip = false;
}
</script>
</body>
</html>
